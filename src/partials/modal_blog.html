<button type="button" class="bunnon-blog" data-modal-open>Subscribe</button>

<div class="backdrop is-hidden" data-modal>
  <div class="modal">
    <button class="modal-btn" type="button" data-modal-close>
      <svg class="modal-icon" width="14" height="14">
        <use href="../img/clous.svg"></use>
      </svg>
    </button>
    <img src="../img/blog/popup-img_mob@1x.jpg" alt="flowers" />
    <div class="modal-cont">
      <h2 class="title-mod">Follow to our newsletter</h2>
      <p class="text-mod">
        Be the first to get exclusive offers and the latest news on our product
        directly in your box.
      </p>
      <form class="modal-form">
        <label class="modal-form-label" for="user_email">Email</label>

        <input class="modal-form-input" type="email" id="user_email" required />

        <button class="contact-form-btn btn" type="submit">Subscribe</button>
      </form>
    </div>
  </div>
</div>
